name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
      - "*.*.*"
  pull_request:
permissions:
  contents: read
  packages: write
env:
  IMAGE_NAME: ghcr.io/ngodat0103/argus

jobs:
  build:
    name: SonarQube and Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - name: Run SonarQube scan
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon

