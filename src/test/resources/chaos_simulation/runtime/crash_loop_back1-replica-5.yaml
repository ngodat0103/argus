apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-svc
  namespace: horizon
spec:
  replicas: 5
  selector:
    matchLabels:
      app: user-svc
  template:
    metadata:
      labels:
        app: user-svc
    spec:
      containers:
        - name: hades
          image: ghcr.io/ngodat0103/yamp/user-svc:0.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"