logging:
  charset:
    console: UTF-8
  pattern:
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:-dd-MM-yyyy HH:mm:ss.SSS}}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%t]){faint} %clr(%logger{0}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
    dateformat: "dd-MM-yyyy HH:mm:ss.SSS"
spring:
  application:
    name: argus
  main:
    log-startup-info: false
    banner-mode: off
  datasource:
    url: jdbc:postgresql://localhost:5432/argus
    username: ${POSTGRES_USER:argus}
    password: ${POSTGRES_PASSWORD:argus}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  ai:
    mcp:
      client:
        enabled: false
server:
  port: 3103
embabel:
  agent:
    platform:
      models:
        deepseek:
          api-key: ${DEEPSEEK_API_KEY}
          base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
          max-attempts: 20
      process-repository:
        window-size: 50
      llm-operations:
        data-binding:
          max-attempts: 20
          fixed-backoff-millis: 5
        prompts:
          default-timeout: 300s
      tools:
        lazy-init: true
  models:
    default-llm: deepseek-chat
    llms:
      reasoning: deepseek-reasoner
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
discovery:
  namespaces:
    - kube-prometheus-stack
    - loki
  probe:
    timeout: 3s
    retry-count: 2
  cache:
    ttl: 5m
  port-forward:
    enabled: true