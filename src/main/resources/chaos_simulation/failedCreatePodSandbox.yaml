apiVersion: apps/v1
kind: Deployment
metadata:
  name: hades
  namespace: horizon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hades
  template:
    metadata:
      labels:
        app: hades
    spec:
      containers:
        - name: hades
          image: ghcr.io/ngodat0103/yamp/user-svc:0.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          envFrom:
            - secretRef:
                name: "oauth-secret"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"