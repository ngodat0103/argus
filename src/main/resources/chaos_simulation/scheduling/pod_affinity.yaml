---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: dev
type: Opaque
data:
  POSTGRES_PASSWORD: cGFzcw== #pass
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: dev
  labels:
    app: postgres
data:
  POSTGRES_DB: "app"
  POSTGRES_USER: "admin"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  # POSTGRES_PASSWORD: pass
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        role: db
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: "zone"
                    operator: In
                    values: ["primary"]
      containers:
        - name: postgres
          image: postgres:12
          imagePullPolicy: "IfNotPresent"
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dev
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: k8app-backend-secret
  namespace: dev
type: Opaque
data:
  SECRET_KEY: OTlkM2IxZjAxYWE2MzllNGE3NmY0ZmMyODFmYzgzNDc0N2E1NDM3MjBiYTRjOGE4NjQ4YmE3NTVhZWY5YmU3Zgo=
  POSTGRES_PASSWORD: cGFzcwo=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8app-backend-config
  namespace: dev
  labels:
    app: k8app-backend
data:
  SERVER_NAME: "server"
  SERVER_HOST: "http://localhost"
  BACKEND_CORS_ORIGINS: '["http://localhost", "http://k8app.com", "http://k8app.com:80", "http://k8app.com:3001", "https://localhost", "https://k8app.com", "https://k8app.com:443", "https://k8app.com:4001"]'
  PROJECT_NAME: "k8app"
  POSTGRES_SERVER: "postgres"
  SECRET_KEY: "99d3b1f01aa639e4a76f4fc281fc834747a543720ba4c8a8648ba755aef9be7f"
  # POSTGRES_PASSWORD: pass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8app-backend
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8app-backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: k8app-backend
        role: backend
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: "kubernetes.io/hostname"
              labelSelector:
                matchLabels:
                  app: postgres
                  role: db
      containers:
        - name: k8app-backend
          image: dangg/k8app-backend-image
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: k8app-backend-config
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          resources:
            limits:
              cpu: 0.5
            requests:
              cpu: 0.25
---
apiVersion: v1
kind: Service
metadata:
  name: k8app-backend
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: k8app-backend
  ports:
    - port: 3000
      name: http
      targetPort: 80
    - port: 4000
      name: https
      targetPort: 443
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8app-frontend-config
  namespace: dev
  labels:
    app: k8app-frontend
data:
  REACT_APP_BACKEND_BASE_URI: "backend.k8app.com/api/items"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8app-frontend
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8app-frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: k8app-frontend
        role: frontend
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: "zone"
              labelSelector:
               matchLabels:
                app: k8app-backend
                role: backend
      containers:
        - name: k8app-frontend
          image: dangg/k8app-frontend-image
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: k8app-frontend-config
          resources:
            limits:
              cpu: 0.5
            requests:
              cpu: 0.25
---
apiVersion: v1
kind: Service
metadata:
  namespace: dev
  name: k8app-frontend
spec:
  type: ClusterIP
  selector:
    app: k8app-frontend
  ports:
    - port: 3001
      name: http
      targetPort: 80
    - port: 4001
      name: https
      targetPort: 443