apiVersion: v1
kind: Service
metadata:
  name: {{ include "argus.name" . }}
  labels:
    {{- include "argus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "argus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
