apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argus.name" . }}-config
  labels:
    {{- include "argus.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  # GitHub App (non-secret). Bound via Spring relaxed binding to github.app.*
  GITHUB_APP_ID: {{ .Values.github.app.id | quote }}
  GITHUB_APP_PRIVATE_KEY_PATH: {{ .Values.github.app.privateKeyPath | quote }}
  {{- with .Values.github.app.tokenRefreshMargin }}
  GITHUB_APP_TOKEN_REFRESH_MARGIN: {{ . | quote }}
  {{- end }}
