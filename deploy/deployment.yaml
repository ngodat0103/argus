apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
spec:
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "3103"
    spec:
      serviceAccountName: argus
      containers:
        - name: argus
          image: ghcr.io/ngodat0103/argus:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3103
          envFrom:
            - configMapRef:
                name: argus-config
            - secretRef:
                name: argus-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 3103
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 3103
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 2
              memory: 512Mi
            limits:
              cpu: 2
              memory: 512Mi
