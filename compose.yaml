name: argus-dev-environment
services:
  postgres:
    image: postgres:16
    container_name: argus-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
     argus-dev:
       ipv4_address: 192.168.29.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
networks:
  argus-dev:
    name: argus-dev
    ipam:
      config:
        - subnet: 192.168.29.0/24